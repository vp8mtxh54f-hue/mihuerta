<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Mi Huerto CR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g1:#1a2e1e;--g2:#22382a;--g3:#2d4a35;--g4:#3a5c42;
  --gm:#40916C;--gl:#74C69D;--gp:#D8F3DC;
  --y:#F9C74F;--or:#F4845F;--bl:#4A9FD4;--re:#E05C5C;
  --tx:#e8f5ec;--tx2:#9dbfa8;--tx3:#5a8a68;
  --bd:#2d4a35;--card:#1e3526;--card2:#243d2a;
  --r:14px;--rs:9px;
}
html,body{height:100%;background:var(--g1);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}
#shell{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:840px;margin:0 auto}

/* header */
#hdr{background:var(--g2);border-bottom:1px solid var(--bd);padding:12px 16px 8px;flex-shrink:0;display:flex;align-items:center;gap:10px}
#hdr-back{background:none;border:none;color:var(--gl);font-size:15px;padding:4px 0;cursor:pointer;display:none;align-items:center;gap:4px}
#hdr-info h1{font-size:16px;font-weight:700;color:var(--tx)}
#hdr-info p{font-size:11px;color:var(--tx3);margin-top:1px}

/* scroll area */
#scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 90px}

/* bottom nav */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:840px;
     background:var(--g2);border-top:1px solid var(--bd);
     display:grid;grid-template-columns:repeat(5,1fr);
     padding:6px 4px env(safe-area-inset-bottom,8px);z-index:99}
.nb{background:none;border:none;color:var(--tx3);font-size:10px;padding:5px 2px;
    display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border-radius:var(--rs)}
.nb svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8}
.nb.on{color:var(--gl);background:rgba(64,145,108,.15)}

/* cards */
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.card2{background:var(--card2);border-radius:var(--rs);padding:10px;margin-bottom:8px}
.sec{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.7px;margin:14px 0 8px}

/* badges */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
.bg{background:rgba(64,145,108,.22);color:var(--gl)}
.by{background:rgba(249,199,79,.2);color:var(--y)}
.bb{background:rgba(74,159,212,.2);color:var(--bl)}
.bo{background:rgba(244,132,95,.2);color:var(--or)}
.br{background:rgba(224,92,92,.2);color:var(--re)}

/* inputs */
input,select,textarea{width:100%;background:var(--card);border:1px solid var(--bd);
  border-radius:var(--rs);padding:10px 12px;color:var(--tx);font-size:15px;
  font-family:inherit;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--gm)}
textarea{resize:vertical;min-height:72px}
label{display:block;font-size:12px;color:var(--tx3);margin:10px 0 4px}
label:first-child{margin-top:0}

/* buttons */
.btn{border:none;border-radius:var(--rs);padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
.btn-p{background:var(--gm);color:#fff}
.btn-s{background:var(--card2);color:var(--tx2);border:1px solid var(--bd)}
.btn-d{background:rgba(224,92,92,.15);color:var(--re);border:1px solid rgba(224,92,92,.3)}
.btn-sm{background:var(--card2);color:var(--tx2);border:1px solid var(--bd);border-radius:var(--rs);
        padding:6px 12px;font-size:12px;cursor:pointer}

/* hero */
.hero{background:linear-gradient(135deg,#2D6A4F,#1B4332);border-radius:var(--r);padding:18px;margin-bottom:12px}
.hero h2{font-size:19px;font-weight:700;margin-bottom:3px}
.hero p{font-size:12px;color:var(--gl);opacity:.9}

/* stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--card);border:1px solid var(--bd);border-radius:var(--rs);padding:10px;text-align:center}
.stat-n{font-size:22px;font-weight:700;color:var(--gl)}
.stat-l{font-size:10px;color:var(--tx3);margin-top:2px}

/* quick links */
.ql{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.qlc{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);
     padding:12px;cursor:pointer;display:flex;align-items:center;gap:8px}
.qlc:active{opacity:.75}
.ql-ico{font-size:20px}
.ql-t{font-size:13px;font-weight:600}
.ql-s{font-size:11px;color:var(--tx3);margin-top:1px}

/* crop grid */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cc{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);
    padding:12px;cursor:pointer;transition:transform .1s}
.cc:active{transform:scale(.96);border-color:var(--gm)}
.cc-emo{font-size:26px;display:block;margin-bottom:5px}
.cc-name{font-size:13px;font-weight:600;margin-bottom:3px}
.cc-meta{font-size:11px;color:var(--tx3)}

/* search */
.srch{position:relative;margin-bottom:12px}
.srch input{padding-left:36px}
.srch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}

/* detail */
.dhdr{background:var(--g3);border-radius:var(--r);padding:16px;margin-bottom:12px}
.dhdr-emo{font-size:42px;display:block;margin-bottom:6px}
.dhdr h2{font-size:21px;font-weight:700;margin-bottom:3px}
.dhdr-sub{font-size:12px;color:var(--gl);opacity:.85}
.igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.ic{background:var(--card2);border-radius:var(--rs);padding:8px;text-align:center}
.ic-l{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.ic-v{font-size:12px;font-weight:600}
.ptabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.ptab{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1px solid var(--bd);
      background:var(--card);color:var(--tx2);font-size:13px;cursor:pointer}
.ptab.on{background:var(--gm);border-color:var(--gm);color:#fff;font-weight:600}
.pcon{display:none}
.pcon.on{display:block}
.pi{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--bd)}
.pi:last-child{border:none}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--gm);flex-shrink:0;margin-top:5px}
.ptx{font-size:13px;color:var(--tx2);line-height:1.55}

/* tracking */
.tcard{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.tcard h3{font-size:15px;font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.tdates{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.tdc{background:var(--card2);border-radius:var(--rs);padding:8px}
.tdl{font-size:9px;color:var(--tx3);margin-bottom:3px}
.tdv{font-size:12px;font-weight:600}
.tdv.em{color:var(--tx3);font-weight:400;font-style:italic}
.pbar{height:4px;background:var(--bd);border-radius:2px;margin:6px 0;overflow:hidden}
.pfill{height:100%;background:var(--gm);border-radius:2px}
.tnotes{background:var(--g1);border-radius:var(--rs);padding:8px;font-size:12px;color:var(--tx2);margin-top:6px}
.tbtns{display:flex;gap:6px;margin-top:10px}
.tbtns button{flex:1}

/* plaga */
.plg{background:var(--card2);border-radius:var(--rs);padding:10px;margin-bottom:7px;border-left:3px solid var(--re)}
.plg-n{font-size:13px;font-weight:600;color:#ff8a8a;margin-bottom:5px}
.plg-r{display:flex;gap:5px;margin-bottom:3px;font-size:12px}
.plg-lb{color:var(--tx3);flex-shrink:0;min-width:62px}
.plg-v{color:var(--tx2)}

/* recipe */
.rcrd{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.rchdr{padding:12px 14px}
.rchdr h3{font-size:15px;font-weight:700}
.rchdr p{font-size:11px;margin-top:2px;opacity:.8}
.rcbdy{padding:12px 14px}
.rcsec h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);margin-bottom:5px}
.rcsec{margin-bottom:10px}
.rclist{list-style:none}
.rclist li{font-size:12px;color:var(--tx2);padding:3px 0;border-bottom:1px solid var(--bd);display:flex;gap:6px}
.rclist li:last-child{border:none}
.rclist li::before{content:"·";color:var(--gm);font-weight:700}
.rcnote{background:var(--g1);border-left:3px solid var(--gm);padding:7px 9px;border-radius:0 var(--rs) var(--rs) 0;font-size:12px;color:var(--tx2)}

/* alert */
.alert{padding:9px 12px;border-radius:var(--rs);font-size:12px;margin-bottom:10px;display:flex;gap:7px;line-height:1.5}
.ag{background:rgba(64,145,108,.14);border:1px solid rgba(64,145,108,.28);color:var(--gl)}
.ao{background:rgba(244,132,95,.14);border:1px solid rgba(244,132,95,.28);color:var(--or)}

/* modal */
.mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;align-items:flex-end;justify-content:center}
.mover.on{display:flex}
.modal{background:var(--g2);border-radius:var(--r) var(--r) 0 0;padding:18px;
       width:100%;max-width:840px;padding-bottom:calc(18px + env(safe-area-inset-bottom,10px));
       max-height:88dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal h3{font-size:17px;font-weight:700;margin-bottom:14px}
.mbtns{display:flex;gap:8px;margin-top:16px}
.mbtns button{flex:1}
</style>
</head>
<body>
<div id="shell">
  <div id="hdr">
    <button id="hdr-back" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
      Volver
    </button>
    <div id="hdr-info">
      <h1 id="hdr-t">Mi Primer Huerto</h1>
      <p id="hdr-s">Costa Rica · 16 cultivos</p>
    </div>
  </div>
  <div id="scr"></div>
  <nav id="nav">
    <button class="nb on" id="nb-home" onclick="go('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Inicio
    </button>
    <button class="nb" id="nb-cultivos" onclick="go('cultivos')">
      <svg viewBox="0 0 24 24"><path d="M12 22V12M12 12C12 7 7 4 2 5c0 5 3 9 7 10M12 12c0-5 5-8 10-7-1 5-4 9-8 10"/></svg>
      Cultivos
    </button>
    <button class="nb" id="nb-seguimiento" onclick="go('seguimiento')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="14" stroke-linecap="round" stroke-width="3"/><line x1="12" y1="14" x2="12" y2="14" stroke-linecap="round" stroke-width="3"/><line x1="8" y1="18" x2="8" y2="18" stroke-linecap="round" stroke-width="3"/></svg>
      Registro
    </button>
    <button class="nb" id="nb-plagas" onclick="go('plagas')">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Plagas
    </button>
    <button class="nb" id="nb-recetas" onclick="go('recetas')">
      <svg viewBox="0 0 24 24"><path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.58 16.5h12.85"/></svg>
      Recetas
    </button>
  </nav>
</div>

<!-- ADD MODAL -->
<div class="mover" id="m-add">
<div class="modal">
  <h3>Nueva siembra</h3>
  <label>Cultivo</label>
  <select id="a-cult"></select>
  <label>Cama / Ubicación</label>
  <input type="text" id="a-cama" placeholder="Ej: Cama 1, Balcón...">
  <label>Fecha de siembra</label>
  <input type="date" id="a-date">
  <label>Notas iniciales (opcional)</label>
  <textarea id="a-notes" placeholder="Condiciones, observaciones..."></textarea>
  <div class="mbtns">
    <button class="btn btn-s" onclick="closeM()">Cancelar</button>
    <button class="btn btn-p" onclick="saveAdd()">Guardar</button>
  </div>
</div>
</div>

<!-- EDIT MODAL -->
<div class="mover" id="m-edit">
<div class="modal">
  <h3>Actualizar registro</h3>
  <label>Fecha de germinación</label>
  <input type="date" id="e-germ">
  <label>Fecha de primer abonado</label>
  <input type="date" id="e-abon">
  <label>Fecha de primera cosecha</label>
  <input type="date" id="e-cose">
  <label>Notas</label>
  <textarea id="e-notes" placeholder="Observaciones, resultados..."></textarea>
  <div class="mbtns">
    <button class="btn btn-s" onclick="closeM()">Cancelar</button>
    <button class="btn btn-p" onclick="saveEdit()">Guardar cambios</button>
  </div>
</div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const D = {"cultivos": {"Albahaca": {"emoji": "🌿", "siembra": ["Siembra superficial: deposita la semilla a apenas 0.3–0.5 cm de profundidad. Son semillas muy pequeñas, no las cubras con demasiada tierra.", "Prefiere tierra liviana, bien drenada y rica en materia orgánica. Mezcla tierra negra con compost maduro en proporción 60/40.", "Temperatura ideal de germinación: 20–25°C. En CR germina bien durante todo el año, especialmente en la época seca.", "Espacio entre plantas: 20–25 cm. Si siembras en bandeja, trasplanta cuando tenga 4–6 hojas verdaderas.", "Luz solar: mínimo 6 horas diarias. Le encanta el sol directo de la mañana.", "Riego: suave y constante. Nunca dejes que la tierra se seque completamente, pero tampoco la enchargues."], "germinacion": ["Tiempo estimado: 5–10 días en condiciones ideales de Costa Rica.", "Señal de éxito: aparecen dos hojitas pequeñas y ovaladas (cotiledones) de color verde claro.", "Mantén el sustrato húmedo pero no empapado durante toda la germinación.", "Protege del sol directo los primeros 5 días. Una vez que asoman los brotes, acércala gradualmente a la luz.", "Si en 12 días no germinó, revisa la humedad y temperatura. La semilla vieja es el problema más común.", "Las plántulas son muy delicadas al inicio. Evita el viento directo y los cambios bruscos de temperatura."], "produccion": ["Primer cosecha posible: 30–40 días después del trasplante.", "Poda de mantenimiento: cuando la planta tenga 15 cm, corta el tallo central justo sobre un par de hojas. Esto la ramifica y duplica la producción.", "Elimina los botones florales (flores) apenas aparezcan. Si florece, las hojas pierden aroma y la planta declina.", "Fertiliza cada 3 semanas con compost líquido o bocashi diluido.", "Cosecha siempre por la mañana, cuando el aceite esencial está en su punto máximo.", "Una planta bien manejada produce hojas por 3–6 meses. Después, conviene renovar con nueva siembra."]}, "Ayote mantequilla": {"emoji": "🎃", "siembra": ["Siembra directa: coloca 2–3 semillas a 2–3 cm de profundidad por punto de siembra. Deja la más vigorosa.", "Tierra muy fértil y con buen drenaje. Esta planta es muy demandante de nutrientes. Prepara el hoyo con abundante compost.", "Necesita mucho espacio: mínimo 80–100 cm entre plantas. Es una planta trepadora/rastrera de gran tamaño.", "Temperatura ideal: 24–30°C. Crece muy bien en el clima tropical de CR durante todo el año.", "Requiere pleno sol: 8 horas mínimo para producir frutos grandes y dulces.", "Si tienes espacio limitado, instala una malla o arco para que trepe verticalmente y ahorre espacio en la cama."], "germinacion": ["Germinación rápida: 5–10 días. Una de las más fáciles del grupo.", "Señal de éxito: dos hojitas grandes, redondeadas y de color verde intenso emergen con fuerza.", "Remoja las semillas 12 horas en agua tibia antes de sembrar para acelerar la germinación.", "El primer par de hojas verdaderas aparece a los 10–14 días. En este punto ya necesita más sol directo.", "Problema común: la semilla se pudre por exceso de riego. Asegura buen drenaje desde el inicio.", "Las plántulas crecen muy rápido. Si están en bandeja, trasplanta cuando tengan 2–3 hojas verdaderas para no dañar la raíz."], "produccion": ["Primeros frutos: 70–100 días después de la siembra.", "Polinización: necesita insectos polinizadores. Si no hay suficientes abejas, poliniza manualmente con un pincel pequeño, transfiriendo el polen de flor masculina a femenina.", "Las flores masculinas aparecen primero (tallo simple). Las femeninas vienen después y tienen un pequeño fruto en la base.", "Riego abundante durante la fructificación. Reduce el riego 2 semanas antes de la cosecha para concentrar el dulzor.", "Fertiliza cada 2 semanas con compost líquido rico en fósforo y potasio (caldo de banano fermentado funciona muy bien).", "Cosecha cuando el tallo que une el fruto a la planta se seque y se vuelva corchoso. El fruto suena hueco al golpearlo."]}, "Brócoli": {"emoji": "🥦", "siembra": ["Siembra en bandeja primero: a 0.5–1 cm de profundidad. Trasplanta al tener 4–5 hojas verdaderas (4–5 semanas).", "Prefiere suelo fértil, ligeramente arcilloso y con buen drenaje. pH ideal: 6.0–7.0.", "En CR, siembra en los meses más frescos: julio–noviembre, especialmente en zonas de altura (San José, Cartago, Heredia).", "Distancia entre plantas: 40–50 cm. Necesita espacio para que la cabeza central se desarrolle bien.", "Requiere al menos 4–6 horas de sol. Tolera algo de sombra parcial mejor que otros cultivos.", "El brócoli es sensible al calor extremo. En zonas calientes de CR (Guanacaste, Pacífico), es difícil de producir."], "germinacion": ["Germinación: 5–10 días a 15–25°C.", "Señal de éxito: dos hojitas pequeñas y redondas emergen. Son frágiles al inicio.", "Requiere temperatura más fresca que la mayoría de los otros cultivos de esta lista.", "Si germina en época caliente, coloca las bandejas en zona con sombra parcial para mantener temperatura más baja.", "Problema común: 'ahilamiento' (tallo muy delgado). Ocurre por falta de luz. Asegura buena iluminación desde el inicio.", "Trasplanta con cuidado: las raíces del brócoli son sensibles. Mueve con el sustrato completo sin romper el pan de raíz."], "produccion": ["Primera cosecha: 60–90 días desde trasplante.", "Señal de cosecha: la cabeza central está compacta, verde oscuro, firmemente unida. Cosecha antes de que los botones amarilleen.", "Corta la cabeza central con 5–8 cm de tallo. Esto estimula la producción de cabezas laterales más pequeñas durante 4–6 semanas.", "Fertiliza con compost rico en nitrógeno cada 3 semanas durante el crecimiento vegetativo.", "Aporca la base de la planta (agrega tierra alrededor del tallo) para darle mayor estabilidad.", "El brócoli es bianual: después de producir, extrae la planta completa y renueva la cama con compost."]}, "Culantro": {"emoji": "🌿", "siembra": ["Siembra directa superficial: 0.5 cm de profundidad. Aplasta levemente la semilla antes de cubrir.", "Truco CR: parte la semilla por la mitad antes de sembrar. Cada mitad produce una planta y mejora la germinación.", "Tierra liviana, bien drenada. Mezcla con un 20% de arena para evitar encharcamiento.", "Distancia: 10–15 cm entre plantas. Puedes sembrar en líneas densas y cosecha gradualmente.", "Tolera semisombra. Ideal en bordes de cama o bajo la sombra parcial de plantas más altas.", "Temperatura ideal: 18–24°C. En CR crece bien casi todo el año, aunque prefiere la época lluviosa."], "germinacion": ["Germinación: 7–10 días.", "Señal de éxito: tallos muy delgados y hojas trilobuladas de color verde claro.", "Remoja las semillas 12 horas antes de sembrar para ablandar la cubierta dura.", "Mantén tierra constantemente húmeda durante la germinación. El culantro es sensible a la sequía en esta etapa.", "Problema común: germinación irregular. Solución: siembra con mayor densidad de lo necesario y ralea después.", "Las plántulas son muy delicadas. Riega con atomizador para no dañarlas ni desplazarlas."], "produccion": ["Primera cosecha: 25–35 días.", "Corta siempre desde la base, dejando 3–4 cm de tallo para el rebrote. Nunca cortes desde arriba.", "Cosecha máximo el 30% de la planta por vez. Le da tiempo de recuperarse y rebrotar.", "El culantro tiende a florecer rápido en época caliente. Mantén la humedad y cosecha frecuentemente para retrasar la floración.", "Una vez que florece, las hojas pierden aroma y sabor. Puedes dejar algunas plantas florecer para colectar semilla propia.", "Siembra escalonada cada 2–3 semanas para tener cosecha continua todo el año."]}, "Cebolla morada": {"emoji": "🧅", "siembra": ["Siembra en bandeja primero: a 1 cm de profundidad. Trasplanta cuando los brotes tengan 15–20 cm de altura.", "Tierra suelta, bien drenada y con buen contenido de fósforo y potasio. Prepara con compost maduro.", "En CR, la mejor época es la seca (diciembre–abril). En época lluviosa tiende a pudrirse.", "Distancia entre plantas: 10–15 cm. Pueden sembrarse bastante juntas pero sin tocarse.", "Pleno sol: 6–8 horas mínimo. Sin sol suficiente, el bulbo no se desarrolla bien.", "Riego moderado. El exceso de agua es el principal enemigo de la cebolla en CR."], "germinacion": ["Germinación: 7–14 días.", "Señal de éxito: finos brotes verdes en forma de hilo curvo que se enderezan gradualmente.", "Temperatura ideal: 18–25°C. Más calor ralentiza la germinación.", "Las semillas de cebolla son de vida corta. Usa semillas frescas (idealmente del año en curso).", "Problema común: poca germinación por semilla vieja. Guarda tus semillas en lugar fresco y seco.", "En bandeja, siembra varios granos por celda y ralea dejando la más fuerte. Las raíces son delicadas al trasplantar."], "produccion": ["Bulbo listo: 90–120 días desde trasplante.", "Señal de cosecha: cuando el 60–70% del follaje se dobla y amarillea de forma natural.", "2 semanas antes de la cosecha, suspende el riego para que el bulbo cure y concentre sabores.", "Cosecha en día seco. Deja los bulbos secar al sol 7–10 días antes de guardar.", "Fertiliza con compost rico en potasio durante la formación del bulbo (últimas 4 semanas).", "Las cebollas moradas son más sensibles al calor y humedad que las blancas. En CR, maneja bien el drenaje."]}, "Lechuga romana": {"emoji": "🥬", "siembra": ["Siembra superficial: 0.3–0.5 cm. Las semillas son muy pequeñas; cúbrelas apenas con una capa fina de tierra.", "Suelo fértil, húmedo y fresco. La lechuga romana es más resistente al calor que otras variedades.", "Temperatura ideal: 15–22°C. En zonas calientes de CR, siembra en sombra parcial.", "Distancia entre plantas: 25–30 cm. La romana crece vertical y necesita algo más de espacio que la mantequilla.", "Trasplanta cuando tenga 4–5 hojas y 8–10 cm de altura. Hazlo de tarde para reducir el estrés.", "Requiere 4–6 horas de sol. Más sol en época lluviosa, sombra parcial en época seca caliente."], "germinacion": ["Germinación: 5–8 días.", "Señal de éxito: par de hojitas lisas y ovaladas de color verde claro.", "La lechuga tiene termodormancia: no germina bien con temperaturas mayores a 26°C.", "Si germinación es lenta, pon las semillas en papel húmedo en el refrigerador 24–48 horas antes de sembrar.", "Problema común: semillas se van con el riego por ser tan livianas. Usa atomizador y riega muy suave.", "La plántula es muy delicada los primeros 10 días. Protege de lluvia fuerte y sol directo intenso."], "produccion": ["Primera cosecha: 50–70 días.", "Puedes cosechar hoja por hoja desde afuera (cosecha continua) o cortar la cabeza entera.", "La cosecha por hojas externas prolonga la vida productiva de la planta hasta 2–3 meses.", "Fertiliza con compost líquido rico en nitrógeno cada 2–3 semanas para mantener el verde intenso.", "Si comienza a espigar (tallo central crece rápido), cosecha de inmediato. Las hojas se amargan.", "Rota la lechuga en la cama cada ciclo. No la siembres dos veces seguidas en el mismo lugar."]}, "Lechuga mantequilla": {"emoji": "🥬", "siembra": ["Siembra superficial: 0.3–0.5 cm. Misma técnica que la romana.", "Prefiere suelo más fresco y húmedo que la romana. Es más sensible al calor.", "Distancia: 20–25 cm entre plantas. La cabeza tipo mantequilla es redondeada y compacta.", "En CR, ideal en épocas más frescas o con sombra parcial en zonas calientes.", "Trasplanta de tarde o en día nublado para reducir estrés hídrico.", "Es ideal para camas pequeñas y balcones por su tamaño compacto."], "germinacion": ["Germinación: 5–7 días, ligeramente más rápida que la romana.", "Señal de éxito: dos hojitas redondas y lisas, muy tiernas y de verde claro.", "Misma precaución de termodormancia: no germina bien con más de 25°C.", "Técnica de preenfriado: semillas en papel húmedo al refrigerador 24h antes de sembrar en época caliente.", "Problema común: plántulas muy delgadas y débiles. Causa: falta de luz. Mueve a zona más iluminada.", "Las primeras hojas verdaderas aparecen 8–10 días después de la germinación."], "produccion": ["Primera cosecha: 45–60 días. Más rápida que la romana.", "La cabeza mantequilla se cosecha cuando está firme y compacta al tacto, antes de que espigue.", "También puedes cosechar hoja por hoja desde afuera para prolongar la producción.", "Muy sensible al calor: si la temperatura sube, cosecha inmediatamente antes de que amargue.", "Fertiliza suavemente cada 2–3 semanas con compost líquido muy diluido.", "Ideal para hacer siembras cada 2 semanas y tener cabezas listas en forma continua."]}, "Menta": {"emoji": "🌿", "siembra": ["La menta se propaga mejor por esquejes o división de raíces que por semilla. Si usas semilla, siembra muy superficial (0.2–0.3 cm).", "Tierra húmeda, fértil y con buen drenaje. La menta tolera más humedad que la mayoría de las hierbas.", "Temperatura: 15–25°C. Crece bien en el clima fresco de la GAM costarricense.", "Distancia: 30–40 cm. La menta se expande agresivamente por rizomas. Considera sembrarla en maceta dentro de la cama para controlarla.", "Tolera semisombra mejor que otras hierbas aromáticas. 4–6 horas de sol son suficientes.", "Si usas esquejes: corta una rama de 10 cm, quita las hojas inferiores y ponla en agua hasta que brote raíz. Trasplanta en 1–2 semanas."], "germinacion": ["Por semilla: germinación lenta, 10–15 días. No es el método más recomendado.", "Por esqueje en agua: raíces visibles en 7–14 días. Método preferido y más confiable.", "Señal de éxito (semilla): pequeñas hojitas redondas con olor a menta ya perceptible.", "Mantén humedad constante durante la germinación. La menta no tolera sequía en esta etapa.", "Las semillas son muy pequeñas. Mezcla con arena fina para distribuirlas mejor al sembrar.", "Problema común por semilla: germinación muy irregular. Por eso se prefiere la propagación vegetativa."], "produccion": ["Primera cosecha: 30–40 días desde trasplante de esqueje.", "Corta ramas completas, dejando siempre 2–3 pares de hojas en la base para el rebrote.", "Elimina flores apenas aparezcan para mantener la calidad y aroma de las hojas.", "Fertiliza moderadamente. Demasiado nitrógeno reduce el contenido de aceites esenciales.", "Cosecha en la mañana, antes de que el sol esté en su punto máximo.", "La menta puede volverse invasiva. Revisa los bordes de la cama mensualmente y recorta los rizomas que salgan."]}, "Manzanilla": {"emoji": "🌼", "siembra": ["Siembra superficial: simplemente esparce las semillas sobre la tierra húmeda y presiónelas suavemente. No las cubras.", "Tierra liviana, bien drenada y con bajo contenido de nutrientes. No necesita mucho compost.", "Temperatura ideal: 18–24°C. En CR, la época lluviosa con temperatura media es perfecta.", "Distancia: 20–25 cm. La planta es compacta pero necesita algo de espacio para florecer bien.", "Requiere pleno sol: 6–8 horas. Sin sol suficiente, la floración es escasa.", "La manzanilla crece mejor sin mucha interferencia. Siémbrala en una zona tranquila de la cama y déjala desarrollarse."], "germinacion": ["Germinación: 7–14 días.", "Señal de éxito: brotes muy finos y delicados de color verde claro. Son frágiles los primeros días.", "Las semillas necesitan luz para germinar. No las cubras con tierra.", "Mantén el sustrato húmedo pero no encharcado. La humedad excesiva pudre las semillas.", "Problema común: semillas arrastradas por el riego. Usa atomizador exclusivamente hasta que los brotes estén establ.", "Las plántulas son muy delicadas. Evita trasplantes innecesarios. Siembra directamente donde va a crecer."], "produccion": ["Primera floración: 60–90 días.", "Cosecha las flores cuando estén completamente abiertas y los pétalos comiencen a curvarse hacia abajo.", "Cosecha de mañana temprano, con rocío aún presente, para mayor concentración de aceites.", "Seca las flores a la sombra en un lugar ventilado. No uses calor directo.", "Una planta bien cuidada florece continuamente por varias semanas.", "La manzanilla es autosembrada: si dejas algunas flores secar en la planta, sembrará sola para el próximo ciclo."]}, "Pepino": {"emoji": "🥒", "siembra": ["Siembra directa: 1–2 semillas a 1.5–2 cm de profundidad. Deja la más fuerte.", "Tierra fértil, suelta y con excelente drenaje. Agrega compost generosamente al hoyo de siembra.", "Temperatura ideal: 24–30°C. En CR crece excelente en época lluviosa cálida.", "Distancia: 40–50 cm entre plantas. Instala tutor o malla vertical desde el inicio.", "Pleno sol: 6–8 horas. Sin luz suficiente, los frutos son pequeños y poco productivos.", "Remoja las semillas 8–12 horas antes de sembrar para acelerar la germinación."], "germinacion": ["Germinación: 5–10 días.", "Señal de éxito: dos hojas grandes, rugosas y de color verde oscuro emerge con fuerza.", "El pepino germina rápido con calor. Si la temperatura baja de 18°C, la germinación se detiene.", "Problema más común: semilla se pudre por exceso de agua. El drenaje es crítico.", "Las plántulas crecen muy rápido. Instala el tutor apenas tengan 10 cm de altura.", "Si sembras en bandeja, trasplanta con cuidado a los 10–12 días. La raíz del pepino es muy sensible."], "produccion": ["Primera cosecha: 50–65 días.", "Cosecha frecuente (cada 2–3 días) para estimular la producción continua. Un pepino que se pasa en la planta la agota.", "Señal de cosecha: verde oscuro brillante, firme, 15–20 cm. Antes de que amarillee.", "Riego abundante y constante. La falta de agua durante la fructificación produce pepinos amargos.", "Fertiliza cada 2 semanas con compost líquido y caldo de banano fermentado para potasio.", "La planta tiene ciclo corto: 60–90 días de producción. Planifica la siguiente siembra con anticipación."]}, "Orégano": {"emoji": "🌿", "siembra": ["Siembra superficial: esparce las semillas sobre tierra húmeda y presiona suavemente. 0.2–0.3 cm máximo.", "Tierra liviana, bien drenada y relativamente pobre en nutrientes. Demasiado compost reduce el aroma.", "Temperatura: 18–27°C. Se adapta muy bien a las temperaturas de la Gran Área Metropolitana de CR.", "Distancia: 25–30 cm. La planta se vuelve arbustiva con el tiempo.", "Pleno sol: mínimo 6 horas. El sol intenso concentra los aceites esenciales y mejora el aroma.", "Como la menta, el orégano también se propaga fácilmente por esquejes en agua."], "germinacion": ["Germinación: 7–14 días.", "Señal de éxito: diminutas hojitas ovaladas de color verde grisáceo con aroma ya perceptible.", "Las semillas son muy pequeñas. Mezcla con arena fina para distribuirlas uniformemente.", "Necesita luz para germinar. No cubras las semillas con tierra.", "Problema común: germinación muy baja por semilla. La propagación por esqueje da mejores resultados.", "Plántulas delicadas al inicio. Riega siempre con atomizador los primeros 15 días."], "produccion": ["Primera cosecha: 30–40 días desde trasplante. Por semilla, 60–80 días.", "Corta ramas de 10–15 cm, dejando siempre 2–3 pares de hojas en la base.", "El orégano gana en aroma y sabor cuando se seca. Cuelga las ramas en lugar seco y ventilado.", "Elimina flores para prolongar la producción de hojas aromáticas.", "Fertiliza muy poco. Exceso de nutrientes reduce drásticamente el contenido de aceites esenciales.", "La poda frecuente mantiene la planta compacta y muy productiva por 2–3 años."]}, "Repollo": {"emoji": "🥬", "siembra": ["Siembra en bandeja: 0.5–1 cm de profundidad. Trasplanta cuando tenga 4–5 hojas verdaderas.", "Tierra fértil, ligeramente arcillosa y con buen contenido de materia orgánica. pH: 6.0–7.0.", "En CR, la mejor época es la más fresca: julio–octubre en zonas altas. En zonas calientes es muy difícil.", "Distancia entre plantas: 45–60 cm. El repollo necesita mucho espacio para formar la cabeza.", "Requiere 4–6 horas de sol. Más sensible al calor que el brócoli.", "Aporcar la planta (agregar tierra alrededor del tallo) a las 3–4 semanas del trasplante para mejor soporte."], "germinacion": ["Germinación: 5–10 días a 15–25°C.", "Señal de éxito: dos hojitas redondeadas de color verde medio. Parecen casi idénticas a las del brócoli.", "Temperatura fresca favorece la germinación. Evita germinar en los meses más calientes del año.", "Problema común: plántulas débiles y alargadas (ahilamiento). Necesita más luz desde el inicio.", "Las plántulas de repollo son robustas una vez establecidas, pero delicadas en los primeros 10 días.", "Trasplanta de tarde y riega bien al trasplantar para reducir el estrés de la muda."], "produccion": ["Cabeza lista: 70–120 días desde trasplante según la variedad.", "Señal de cosecha: la cabeza está compacta, firme al presionar con la palma. Si empieza a agrietarse, cosecha de inmediato.", "Corta la cabeza con 2–3 hojas externas para protección. Deja la raíz para que produzca brotes secundarios.", "Fertiliza con compost rico en nitrógeno cada 3 semanas durante el crecimiento vegetativo.", "El repollo es muy exigente en agua. Riego constante evita que la cabeza se agriete.", "Requiere rotación estricta. No lo siembres dos ciclos seguidos en el mismo lugar."]}, "Romero": {"emoji": "🌿", "siembra": ["La propagación por semilla es lenta y difícil. Se recomienda ampliamente usar esquejes.", "Si usas semilla: siembra superficial a 0.2–0.3 cm. Requiere temperatura constante y paciencia.", "Por esqueje: corta una rama joven de 10–15 cm, quita hojas inferiores, coloca en sustrato húmedo. Raíces en 3–4 semanas.", "Tierra muy bien drenada, arenosa y pobre. El romero no tolera suelos húmedos ni ricos en nutrientes.", "Distancia: 50–60 cm. Se convierte en un arbusto mediano con el tiempo.", "Pleno sol: 6–8 horas mínimo. Sin sol suficiente, pierde aroma y se vuelve leggy (alargado)."], "germinacion": ["Por semilla: germinación muy lenta, 15–25 días con baja tasa de éxito (30–50%).", "Señal de éxito: pequeñas hojitas aciculares (en forma de aguja) de color verde grisáceo.", "Temperatura ideal de germinación: 20–25°C.", "Problema común: la mayoría de las semillas no germinan. Siembra el triple de lo que necesitas.", "Por esqueje: más del 90% de éxito. El método definitivamente recomendado para esta planta.", "Las plántulas de romero crecen MUY lento. Ten paciencia: tarda 6–8 semanas en verse como planta real."], "produccion": ["Primera cosecha significativa: 90–120 días por esqueje. Por semilla, puede tardar 6 meses.", "Corta ramas de 10–15 cm del extremo de las ramas principales. Nunca cortes más del 30% de la planta.", "El romero es una planta perenne: bien cuidado, puede producir por 5–10 años.", "Poda de mantenimiento cada 2–3 meses para mantenerlo compacto y estimular nuevo crecimiento.", "Fertiliza muy poco: una aplicación de compost por año es suficiente. Más nutrientes reducen el aroma.", "En CR con su humedad tropical, asegura excelente drenaje. El romero se pudre con los pies mojados."]}, "Tomate": {"emoji": "🍅", "siembra": ["Siembra en bandeja: 0.5–1 cm de profundidad. Trasplanta cuando tenga 15–20 cm de altura.", "Tierra fértil, suelta, con buen drenaje y pH 6.0–6.8. Prepara el hoyo con abundante compost.", "Temperatura ideal: 22–28°C. En CR crece bien durante todo el año en la GAM.", "Distancia: 50–60 cm entre plantas. Instala tutor robusto desde el trasplante.", "Pleno sol: 6–8 horas mínimo. Sin suficiente sol, la planta produce poco y es muy susceptible a enfermedades.", "Al trasplantar: entierra el tallo hasta las primeras hojas. Las raíces adventicias del tallo aumentan la base nutricional."], "germinacion": ["Germinación: 7–14 días.", "Señal de éxito: dos hojitas redondas y lisas (cotiledones) emergen. Las primeras hojas verdaderas son dentadas.", "Temperatura de germinación: mínimo 18°C. Por debajo de eso, muy lenta o nula.", "Problema común: plántulas muy alargadas y débiles (ahilamiento). Causa: falta de luz. Acerca a luz solar directa.", "Las plántulas necesitan ser 'endurecidas': expón gradualmente al sol directo durante 5–7 días antes del trasplante.", "Trasplanta de tarde para reducir el estrés hídrico. Riega bien antes y después del trasplante."], "produccion": ["Primera cosecha: 70–90 días desde trasplante.", "Desbrota regularmente: elimina los brotes axilares (entre el tallo y la rama) para concentrar energía en los frutos.", "Señal de cosecha: color rojo intenso uniforme, cede ligeramente al tacto, aroma característico.", "Cosecha frecuente (cada 2–3 días) para estimular la producción continua.", "Fertiliza cada 2 semanas: nitrógeno en crecimiento vegetativo, fósforo/potasio al inicio de la floración.", "Poda de hojas bajeras (las que tocan el suelo) para mejorar la circulación del aire y prevenir hongos."]}, "Zanahoria": {"emoji": "🥕", "siembra": ["Siembra directa: esparce semillas a 0.5–1 cm de profundidad. No trasplantar: la zanahoria no lo tolera bien.", "Tierra muy suelta, profunda (mínimo 30 cm) y libre de piedras o terrones. La raíz se bifurca con obstáculos.", "Mezcla tierra negra con arena gruesa (30%) para garantizar que la raíz baje derecho y sin resistencia.", "Temperatura: 15–22°C. Prefiere clima más fresco. En CR, mejor en zonas altas o época menos caliente.", "Distancia: 5–8 cm entre plantas. Siembra denso y ralea después a 8–10 cm cuando tengan 5 cm de altura.", "La semilla de zanahoria es muy pequeña y demora. Mezcla con arena fina para distribuir mejor."], "germinacion": ["Germinación: 10–20 días. Una de las más lentas del grupo. ¡Ten paciencia!", "Señal de éxito: finos hilos verdes que emergen del suelo. Son muy delicados al inicio.", "Mantén el sustrato constantemente húmedo durante la germinación. Si se seca una sola vez, las semillas mueren.", "Cubre con una tela húmeda o papel periódico los primeros días para conservar la humedad.", "Problema común: nada emerge. Causas posibles: semilla vieja, tierra muy compacta, o sequía en germinación.", "No desesperes si tarda más de 10 días. La zanahoria es la más lenta del grupo pero vale la pena."], "produccion": ["Cosecha: 70–90 días desde siembra.", "Señal de cosecha: la corona naranja del bulbo asoma sobre la tierra. El diámetro del hombro es de 1.5–2 cm.", "Afloja la tierra con una horquilla antes de jalar para no romper la raíz.", "No riegues los últimos 7–10 días para que la zanahoria concentre su dulzor.", "Fertiliza con compost bajo en nitrógeno y alto en fósforo/potasio. Demasiado nitrógeno produce mucho follaje y poca raíz.", "Ralea a tiempo: si las plantas están muy juntas, las raíces salen pequeñas y deformes."]}, "Zapallo zucchini": {"emoji": "🥒", "siembra": ["Siembra directa: 2–3 semillas a 2–3 cm de profundidad por punto. Deja la más vigorosa.", "Tierra muy fértil y bien drenada. Prepara el hoyo con doble porción de compost. El zucchini es muy demandante.", "Temperatura ideal: 22–30°C. Crece muy bien en el clima tropical de CR durante todo el año.", "Distancia: 80–100 cm entre plantas. Necesita mucho espacio para extenderse o trepar.", "Pleno sol: 6–8 horas mínimo. Sin suficiente luz, los frutos son pequeños.", "Remoja las semillas 12 horas antes de sembrar para acelerar la germinación."], "germinacion": ["Germinación muy rápida: 4–8 días. Una de las más rápidas del grupo.", "Señal de éxito: dos grandes hojas anchas emergen con fuerza. El crecimiento inicial es muy vigoroso.", "La semilla tiene un 'casquete' que a veces queda pegado a la hoja. Retíralo suavemente si no cae solo.", "Problema común: semilla se pudre por exceso de agua. Drena bien desde el inicio.", "Las plántulas crecen muy rápido. Si están en bandeja, trasplanta apenas tenga 2–3 hojas verdaderas.", "Instala tutor o guía de crecimiento desde el inicio si quieres cultivarlo verticalmente."], "produccion": ["Primera cosecha: 45–60 días. ¡Uno de los más rápidos en producir del grupo!", "Cosecha frecuente y temprana: el zucchini ideal mide 15–20 cm. Si crece más, se vuelve fibroso.", "Cosecha cada 2–3 días durante la producción activa. Los frutos crecen muy rápido.", "Polinización manual: como el ayote, puede necesitar ayuda. Usa un pincel para transferir el polen.", "Fertiliza abundantemente cada 2 semanas. El zucchini consume muchos nutrientes por su rápido crecimiento.", "Señal de fin de ciclo: producción disminuye, hojas se amarillan. Extrae y renueva con compost antes de nueva siembra."]}}, "plag  ["6 dientes de ajo", "3–5 chiles picantes frescos (jalapeño o chile panameño)", "1 litro de agua", "2 cucharadas de jabón natural rallado", "1 cebolla pequeña (opcional, potencia el efecto)"], "preparacion": ["Licua el ajo, el chile y la cebolla con 200 ml de agua.", "Cuela bien con tela fina para eliminar todo residuo sólido.", "Agrega el resto del agua y el jabón. Mezcla bien.", "Deja reposar 30 minutos antes de aplicar."], "aplicacion": "Aplica con spray generosamente en toda la planta, especialmente el envés. Es más fuerte que el spray simple de ajo, úsalo cuando la plaga ya está activa.", "frecuencia": "Cada 3–4 días hasta controlar la plaga. Luego alterna con el spray de ajo simple.", "notas": "Evita el contacto con ojos. Usa guantes al preparar. No aplicar en días de mucho calor."}, {"nombre": "Spray de Bicarbonato (Anti-hongos)", "emoji": "🫙", "color": "#3A9BD5", "plagas": "Oídio, mildiu, tizón temprano, roya — todos los hongos foliares", "ingredientes": ["1 cucharada de bicarbonato de sodio", "1 cucharada de jabón natural líquido o rallado", "1 litro de agua", "1 cucharadita de aceite vegetal (mejora adherencia)"], "preparacion": ["Disuelve el bicarbonato en el agua.", "Agrega el jabón y el aceite.", "Mezcla suavemente para no generar espuma excesiva.", "Usa inmediatamente; no se conserva bien."], "aplicacion": "Aplica en spray cubriendo bien todas las hojas (haz y envés). Es preventivo y curativo en etapas tempranas.", "frecuencia": "Cada 7–10 días como preventivo en época lluviosa. Cada 3–5 días si ya hay hongos visibles.", "notas": "Aplicar excesivamente puede alcalinizar el suelo. No apliques más de 2 veces por semana."}, {"nombre": "Spray de Leche (Anti-oídio)", "emoji": "🥛", "color": "#F9C74F", "plagas": "Oídio específicamente (el polvo blanco en hojas de pepino, zucchini, ayote)", "ingredientes": ["100 ml de leche entera (fresca o en polvo reconstituida)", "900 ml de agua"], "preparacion": ["Mezcla simplemente la leche con el agua.", "Agita bien ant const CV = D.cultivos, PL = D.plagas, RC = D.recetas, SI = D.siembra;

// ── IN-MEMORY STATE (no localStorage — works from Files app on iOS) ───────────
let entries = [];   // [{id,cultivo,cama,siembra,germina,abono,cosecha,notas}]
let tab = 'home';
let crop = null;
let editId = null;
let q = '';

// ── Helpers ───────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const fmt = d => { if(!d) return '—'; const [y,m,da]=d.split('-'); return `${da}/${m}/${y.slice(2)}`; };
const diff = (a,b) => { if(!a) return null; return Math.round((new Date(b||new Date())-new Date(a))/864e5); };
const pct  = (e) => {
  const inf = SI[e.cultivo]||{};
  const d = diff(e.siembra); if(!d||!inf.dias) return 0;
  return Math.min(100, Math.round(d/parseInt(inf.dias)*100));
};
const status = e => e.cosecha ? ['Cosechado','bo'] : e.germina ? ['Creciendo','bg'] : ['Germinando','bb'];

// ── Navigation ────────────────────────────────────────────────────────────────
function go(t) {
  tab = t; crop = null;
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  $('nb-'+t).classList.add('on');
  render();
}
function goBack() { crop = null; render(); }
function hdr(t,s) { $('hdr-t').textContent=t; $('hdr-s').textContent=s; }
function showBack(v) { const b=$('hdr-back'); b.style.display=v?'flex':'none'; }

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const c=$('scr'); c.scrollTop=0;
  if (crop) { renderCrop(c); return; }
  if (tab==='home')        renderHome(c);
  else if (tab==='cultivos')    renderCultivos(c);
  else if (tab==='seguimiento') renderSeg(c);
  else if (tab==='plagas')      renderPlagas(c);
  else if (tab==='recetas')     renderRecetas(c);
}

}

}
function openEdit(id) {
  editId=id;
  const e=entries.find(x=>x.id===id); if(!e) return;
  $('e-germ').value=e.germina||'';
  $('e-abon').value=e.abono||'';
  $('e-cose').value=e.cosecha||'';
  $('e-notes').value=e.notas||'';
  $('m-edit').classList.add('on');
}
function closeM() {
  document.querySelectorAll('.mover').forEach(m=>m.classList.remove('on'));
  editId=null;
}
function saveAdd() {
  entries.unshift({id:uid(),cultivo:$('a-cult').value,cama:$('a-cama').value,
    siembra:$('a-date').value,germina:'',abono:'',cosecha:'',$notes:$('a-notes').value,notas:$('a-notes').value});
  closeM(); go('seguimiento');
}
function saveEdit() {
  const i=entries.findIndex(x=>x.id===editId); if(i<0) return;
  entries[i].germina=$('e-germ').value;
  entries[i].abono=$('e-abon').value;
  entries[i].cosecha=$('e-cose').value;
  entries[i].notas=$('e-notes').value;
  closeM(); render();
}
function delEntry(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  entries=entries.filter(x=>x.id!==id); render();
}

// Close modal on backdrop tap
document.querySelectorAll('.mover').forEach(m=>{
  m.addEventListener('click',e=>{ if(e.target===m) closeM(); });
});

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
